# Test config for the common module's @SpringBootTest slice.
#
# No master key here on purpose: the crypto key is generated in-memory and supplied at runtime via
# @DynamicPropertySource (see SettingsFlywayIntegrationTest), so no key value is ever committed —
# mirroring the production contract that the key comes from the environment only.

# Flyway owns the schema; Hibernate only validates that the entities match the migrated tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
