# gitleaks config — nobilis-platform secret-scan gate.
#
# Goal: block real key/secret/token VALUES in any committed file (source, resources, and
# crucially test resources) while NOT false-positiving on what is explicitly allowed —
# property NAMES, ${ENV} placeholders, and clearly-fake samples in *.example files.
# See the "Secrets — never hardcode keys" section in CLAUDE.md.

title = "nobilis-platform gitleaks"

[extend]
# Start from gitleaks' built-in ruleset (AWS keys, private keys, generic-api-key, etc.).
useDefault = true

[[rules]]
id = "nobilis-base64-256bit-key"
description = "Base64-encoded 256-bit key/secret assigned to a property or field"
# A secret-ish name, then '=' or ':', then a 44-char Base64 value (43 chars + '=' pad) — the exact
# shape of an AES-256 key (e.g. nobilis.crypto.master-key=<key>). A bare property NAME with no
# value, and ${ENV} placeholders, do not match. Entropy gate keeps fake/low-entropy strings out.
regex = '''(?i)(?:master[-_.]?key|api[-_.]?key|secret|password|passwd|token)["']?\s*[:=]\s*["']?([A-Za-z0-9+/]{43}=)'''
secretGroup = 1
entropy = 3.5
keywords = ["key", "secret", "password", "passwd", "token"]

[[rules]]
id = "nobilis-telegram-bot-token"
description = "Telegram Bot API token (bot_id:secret shape)"
# The nobilis-base64-256bit-key rule above only matches a 44-char Base64 value — a Telegram bot
# token (e.g. 123456789:ABCdefGhIJKlmNoPQRstuVWXyz1234567890, per core.telegram.org/bots/api) has a
# different shape and would slip past it. Matches the bot-id ':' secret structure directly (a bare
# property NAME with no value, and ${ENV} placeholders, do not match).
regex = '''[0-9]{8,10}:[A-Za-z0-9_-]{34,36}'''
entropy = 3.5

[[rules]]
id = "nobilis-messaggio-login"
description = "Messaggio SMS gateway login assigned to a property or field"
# Messaggio-Login is an arbitrary unstructured string (a login/username) with no fixed detectable
# shape, unlike the Telegram token above — a value-shape regex isn't possible, so this rule is
# keyword-gated on the PROPERTY KEY shape instead: literal "messaggio.login" (the dotted
# nobilis.notification.sms.messaggio.login key), not the HTTP header name "Messaggio-Login" (hyphen)
# that shows up in plain-English docs/plans describing the protocol — a bare property NAME with no
# value, ${ENV} placeholders, and "<placeholder>"-style doc values do not match.
regex = '''(?i)messaggio\.login\s*[:=]\s*["']?([^\s"'$<][^\s"'>]{2,})'''
secretGroup = 1
keywords = ["messaggio.login"]

[allowlist]
description = "Fake samples and placeholders that must never trip the scan"
# *.example / *.example.<ext> files carry intentionally-fake structural samples only;
# dependency/build output is never our source of truth and is excluded from scanning.
paths = [
  '''\.example($|\.[^/]+$)''',
  '''(^|/)node_modules/''',
  '''(^|/)dist/''',
  '''(^|/)target/''',
]
# ${ENV_VAR} placeholders are references, not values.
regexes = [
  '''\$\{[A-Za-z0-9_]+\}''',
]
