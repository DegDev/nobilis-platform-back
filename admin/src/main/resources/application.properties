# nobilis-platform :: admin — application configuration.

# --- Stateless by default: exclude the DataSource/JPA/Flyway auto-configurations -------------------
# common drags Spring Data JPA, Hibernate and Flyway onto the classpath, but the default admin host
# touches no database, so their auto-configurations are excluded here and the host boots without a
# running Postgres. This lives as a PROPERTY (not on @SpringBootApplication) so a profile can turn
# persistence back on with a one-line override: application-local.properties resets this to empty and
# supplies a datasource — see application-local.properties.example. FQNs are the Spring Boot 4
# module-split package names, not the pre-4 org.springframework.boot.autoconfigure.* ones.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration,org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration

# --- Error contract: RFC 9457 Problem Details (application/problem+json) ---------------------------
# The admin REST framework returns errors as RFC 9457 ProblemDetail. Enabling this makes Spring MVC's
# own exception handling (validation, etc.) emit problem+json too, so the whole surface is uniform.
spring.mvc.problemdetails.enabled=true

# --- Admin email/password login (auth engine, opt-in) ---------------------------------------------
# Off by default: the capability is mounted only when explicitly enabled (engine opt-in principle).
# To turn it on for a deployment, set this true AND supply the three secrets below via the
# environment (never commit their values — see CLAUDE.md "Secrets"):
#   NOBILIS_AUTH_ADMIN_LOGIN_EMAIL          -> nobilis.auth.admin-login.email
#   NOBILIS_AUTH_ADMIN_LOGIN_PASSWORD_HASH  -> nobilis.auth.admin-login.password-hash  (a BCrypt hash)
#   NOBILIS_AUTH_JWT_SECRET                 -> nobilis.auth.jwt.secret  (Base64, >= 256-bit)
nobilis.auth.admin-login.enabled=false
