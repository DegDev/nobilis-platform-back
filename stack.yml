# nobilis-platform — dev infra stack
# Up:    docker compose -f stack.yml up -d
# Down:  docker compose -f stack.yml down
#
# Reproducibility principle: pin every image by tag, NEVER :latest.
# Tags marked TODO-pin: verify and pin the exact version before committing.

name: nobilis-platform

services:
  postgres:
    image: postgres:18
    container_name: nobilis-postgres
    environment:
      POSTGRES_USER: nobilis
      POSTGRES_PASSWORD: nobilis
      POSTGRES_DB: nobilis
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
      # demo-back-compatible `postgres`/`example` superuser (browsing only);
      # runs only on a fresh volume — see the script header.
      - ./.docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nobilis"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Adminer — lightweight DB browser for Postgres. Opt-in: gated behind the
  # `dev-tools` profile, so a plain `up -d` does NOT start it. Enable with
  # `docker compose -f stack.yml --profile dev-tools up -d`, then http://localhost:8081.
  adminer:
    image: adminer:latest                 # TODO-pin: set a concrete tag
    container_name: nobilis-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres    # pre-fills the login form's Server field
    depends_on:
      - postgres
    profiles: ["dev-tools"]

  kafka:
    image: apache/kafka:4.3.1
    container_name: nobilis-kafka
    ports:
      - "9092:9092"     # internal listener (for containers on the compose network -> kafka:9092)
      - "29092:29092"   # host listener (for tools on your machine -> localhost:29092)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # single-node dev: everything at replication factor 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data

  # Kafka UI — clearest view of topics/messages/lag. Works with plain Kafka.
  redpanda-console:
    image: redpandadata/console:latest   # TODO-pin: set a concrete tag
    container_name: nobilis-kafka-console
    ports:
      - "8085:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka

  minio:
    image: minio/minio:latest             # TODO-pin: set a concrete tag
    container_name: nobilis-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nobilis
      MINIO_ROOT_PASSWORD: nobilis-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest         # TODO-pin: set a concrete tag
    container_name: nobilis-mailpit
    ports:
      - "1025:1025"   # SMTP (inbound from the app)
      - "8025:8025"   # web UI (view emails)

  # Ollama is NOT containerized — we use the native host install (localhost:11434).
  # Faster and no GPU hassle. Containers reach it not via localhost but via the host
  # address: on Linux — host.docker.internal (needs extra_hosts: "host-gateway")
  # or the docker bridge IP. We'll wire this up in milestone 06 (ai-slice), not now.

volumes:
  pg_data:
  kafka_data:
  minio_data:
