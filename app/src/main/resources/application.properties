# nobilis-platform :: app — application configuration.

# --- Stateless by default: exclude the DataSource/JPA/Flyway auto-configurations -------------------
# common drags Spring Data JPA, Hibernate and Flyway onto the classpath, but by default the portal
# host touches no database, so their auto-configurations are excluded here. Without this the host
# does not start at all: DataSourceAutoConfiguration fails with "Failed to configure a DataSource:
# 'url' attribute is not specified". This lives as a PROPERTY (not on @SpringBootApplication) so a
# profile can turn persistence back on with a one-line override — application-local.properties does
# exactly that, so the portal can read CMS content published via the admin host (see
# PortalContentController). FQNs are the Spring Boot 4 module-split package names, not the pre-4
# org.springframework.boot.autoconfigure.* ones.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration,org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration

# --- HTTP character encoding ---------------------------------------------------------------------
# Localized plain-text responses must not depend on the server process's native charset.
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

# --- Port -----------------------------------------------------------------------------------------
# The portal host binds 8082 so it can run alongside the admin host locally: admin stays on the
# default 8080, which the frontend's projects/admin/proxy.conf.json hardcodes as its proxy target.
server.port=8082
