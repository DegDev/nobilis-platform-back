# Headless worker process: no embedded web server.
spring.main.web-application-type=none

# --- Stateless by default: exclude the DataSource/JPA/Flyway auto-configurations -------------------
# common drags Spring Data JPA, Hibernate and Flyway onto the classpath, but slice-1 of the worker
# touches no database, so their auto-configurations are excluded here — same exclusion set as
# app/admin (see those modules' application.properties for the rationale). FQNs are the Spring Boot 4
# module-split package names, not the pre-4 org.springframework.boot.autoconfigure.* ones.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration,org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
