# Headless worker process: no embedded web server.
spring.main.web-application-type=none

# --- DB access (slice 2) ----------------------------------------------------------------------------
# Slice 1 excluded DataSource/JPA/Flyway (the worker touched no database). Slice 2 adds the
# notification dispatcher, which resolves templates via NotificationsService — gated on an
# EntityManagerFactory bean (NotificationsAutoConfiguration) — so the worker is now a legitimate
# notifications-data consumer and always boots with a real datasource, same credentials pattern as
# app/admin's local dev profile.
spring.datasource.url=${NOBILIS_DB_URL:jdbc:postgresql://localhost:5433/nobilis}
spring.datasource.username=${NOBILIS_DB_USERNAME:nobilis}
spring.datasource.password=${NOBILIS_DB_PASSWORD:nobilis}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Email transport (slice 2) — Mailpit dev SMTP ---------------------------------------------------
# The only transport this slice (decision: notifications dispatcher, EMAIL via spring-boot-starter-mail).
spring.mail.host=${NOBILIS_MAIL_HOST:localhost}
spring.mail.port=${NOBILIS_MAIL_PORT:1025}

# --- Telegram transport (slice 4) — send-only, opt-in on a bot token --------------------------------
# nobilis.notification.telegram.bot-token is deliberately NOT set here (unlike mail/db above): the
# property must stay genuinely ABSENT for @ConditionalOnProperty to keep TelegramNotificationTransport
# unmounted by default — an empty-string default would still count as "present" and wrongly mount it.
# Set the env var NOBILIS_NOTIFICATION_TELEGRAM_BOT_TOKEN to opt in (Spring's relaxed env-var binding
# maps it to this property automatically, same mechanism as nobilis.crypto.master-key). A separate bot
# from the (deferred, code-free) Telegram LOGIN widget of milestone 02. Never commit a real value —
# see .gitleaks.toml.

# --- SMS transport (slice 5) — Messaggio, send-only, opt-in on both login and sender-id -------------
# nobilis.notification.sms.messaggio.login and .sender-id are deliberately NOT set here, same reason
# as the Telegram bot-token above: they must stay genuinely ABSENT for @ConditionalOnProperty to keep
# SmsNotificationTransport unmounted by default. Set NOBILIS_NOTIFICATION_SMS_MESSAGGIO_LOGIN and
# NOBILIS_NOTIFICATION_SMS_MESSAGGIO_SENDER_ID to opt in (Spring's relaxed env-var binding). Optional:
# nobilis.notification.sms.messaggio.base-url (defaults to https://msg.messaggio.com) and
# nobilis.notification.sms.country-code (account/plan-specific, e.g. 373 for Moldova; empty = no
# prefix applied). Never commit a real login value — see .gitleaks.toml.

# --- Scheduler harness (slice 6) — generic periodic-job mechanism, opt-in, no real job yet ----------
# nobilis.integration.scheduling.enabled activates Spring's @Scheduled mechanism
# (SchedulingConfiguration). Deliberately NOT set here — absent by default means no TaskScheduler, no
# scheduling at all. Independent of that, nobilis.integration.scheduling.demo-tick.enabled gates
# DemoTickJob, a test-only tick-logger proving the harness runs live: enabling scheduling for a future
# real job does not also start the demo. Optional: nobilis.integration.scheduling.demo-tick.fixed-delay
# (ms, defaults to 60000 if scheduling and the demo tick are both enabled without it set).
